upstream backend  { server backend:8000; }
upstream frontend { server frontend:3000; }
upstream portal   { server portal:3001; }

# Port 80 — User portal (SayMyName97)
server {
    listen 80;
    server_name _;

    # Portal API proxy (token-based, no admin auth)
    location /portal/ {
        proxy_pass       http://backend/portal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User portal React app
    location / {
        proxy_pass         http://portal/;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# Port 8080 — subscription URLs (Shadowrocket rejects self-signed certs)
server {
    listen 8080;
    server_name _;

    # Subscription URLs available over plain HTTP for VPN clients
    location /sub/ {
        proxy_pass       http://backend/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_header Subscription-Userinfo;
    }

    # Everything else → redirect to HTTPS
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Admin API
    location /api/ {
        proxy_pass         http://backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Subscription URLs (public, no auth)
    location /sub/ {
        proxy_pass       http://backend/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_header Subscription-Userinfo;
    }

    # Agent endpoints (HMAC-authenticated at app level)
    location /agent/ {
        proxy_pass       http://backend/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://backend/health;
    }

    # React frontend (with websocket support for hot reload)
    location / {
        proxy_pass         http://frontend/;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
