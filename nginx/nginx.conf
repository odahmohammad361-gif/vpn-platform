upstream backend  { server backend:8000; }
upstream frontend { server frontend:3000; }
upstream portal   { server portal:3001; }

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name saymy-vpn.com www.saymy-vpn.com;
    return 301 https://saymy-vpn.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name saymy-vpn.com www.saymy-vpn.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Secret admin path ─────────────────────────────
    location /ilovemydad9708/ {
        proxy_pass         http://frontend/;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Admin API (only accessible via secret path prefix) ──
    location /ilovemydad9708/api/ {
        proxy_pass         http://backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Agent endpoints (HMAC-authenticated) ──────────
    location /agent/ {
        proxy_pass       http://backend/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Subscription URLs ──────────────────────────────
    location /sub/ {
        proxy_pass       http://backend/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_header Subscription-Userinfo;
        proxy_pass_header profile-title;
        proxy_pass_header profile-update-interval;
    }

    # ── Signup + payment (public) ──────────────────────
    location /signup {
        proxy_pass       http://backend/signup;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /signup/ {
        proxy_pass       http://backend/signup/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Portal API ─────────────────────────────────────
    location /portal/ {
        proxy_pass       http://backend/portal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check (internal) ────────────────────────
    location /health {
        proxy_pass http://backend/health;
    }

    # ── User portal (default) ──────────────────────────
    location / {
        proxy_pass         http://portal/;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
