version: "3.9"

# ── Deployment: AWS Ubuntu EC2 ──
# Database: Aurora RDS PostgreSQL (external — not in compose)
# VPN Servers: 2x Contabo Ubuntu (run agent separately)

services:
  backend:
    build: ./backend
    restart: always
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # DATABASE_URL points to Aurora RDS — set in .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - vpn_net

  frontend:
    build: ./frontend
    restart: always
    networks:
      - vpn_net

  nginx:
    build: ./nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - vpn_net
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro

  portal:
    build: ./portal
    restart: always
    networks:
      - vpn_net

  telegram:
    build: ./telegram
    restart: always
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vpn_net

networks:
  vpn_net:
    driver: bridge
